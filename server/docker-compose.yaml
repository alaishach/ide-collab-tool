services:
  api:
    image: golang:1.26-bookworm
    ports:
      - "${SERVER_EXT}:${SERVER_PORT}"
    volumes:
      - ./go.mod:/app/go.mod
      - ./go.sum:/app/go.sum
      - ./main.go:/app/main.go
      - ./src/:/app/src
      - ./.env:/app/env
      - ./go-pkg-mod:/go/pkg/mod
      - ./assets/:/app/assets
    command: sh -c "cd /app && go run main.go"
    networks:
      - colab-net
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
  db:
    image: docker.io/library/postgres:18-alpine
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PWD}
      PGPASSWORD: ${DB_PWD}
    ports:
      - "${DB_EXT}:${DB_PORT}"
    volumes:
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
      - db_data:/var/lib/postgresql
    networks:
      - colab-net
    restart: unless-stopped
    healthcheck:
      test: pg_isready -U ${DB_USER} -d ${DB_NAME}
      interval: 10s
      timeout: 3s
      retries: 3
  redis:
    image: docker.io/library/redis:8.4.2-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    ports:
      - "${REDIS_EXT}:${REDIS_PORT}"
    volumes:
      - redis_data:/data
    networks:
      - colab-net
    restart: unless-stopped

networks:
  colab-net:
    driver: bridge

volumes:
  redis_data:
  db_data:
